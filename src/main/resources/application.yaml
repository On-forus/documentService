server:
  port: 8099
spring:
  application:
    name: document-service
    version: 0.0.1
  config:
    import:
      - optional:file:.env[.properties]

  jpa:
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        id:
          new_generator_mapping: true
        jdbc:
          batch_size: ${BATCH_SIZE}
        order_inserts: true
        order_updates: true
        order_select: true
        generate_statistics: true
        default_schema: public
    hibernate:
      ddl-auto: create
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      minimumIdle: 2
      maximumPoolSize: 10
      idleTimeout: 120000
      connectionTimeout: 300000
      leakDetectionThreshold: 300000
  liquibase:
    change-log: db/changelog/changelog.xml
    enabled: true
logging:
  level:
    org:
      springframework:
        orm:
          jpa: ERROR
        transaction: DEBUG
      hibernate:
        SQL: ERROR
        type:
          descriptor:
            sql:
              BasicBinder: ERROR

document-api:
  config:
    batch-size: ${BATCH_SIZE}
    attempts: ${ATTEMPT_SIZE}
    threads: ${THREAD_SIZE}
    scheduled: ${FIXED_DELAY}
